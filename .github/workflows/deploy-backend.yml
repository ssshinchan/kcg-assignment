name: Backend CI/CD Pipeline

on:
  push:
    branches:
      - master
    paths-ignore:
      - 'frontend/**'

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Log in to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 2. Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Build & Push Backend Docker Image
      - name: Build and Push Backend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/assignment-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/assignment-backend:${{ github.sha }}

      # 4. Configure AWS Credentials (Uses secrets when ready)
      - name: Configure AWS Credentials (Mocked/Configured)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}

      # 5. Simulate Backend AWS Deployment
      - name: Deploy Backend to AWS (Mocked)
        run: |
          echo "===== Deploying Backend container ====="
          echo "Deploying backend container using image: ${{ secrets.DOCKERHUB_USERNAME }}/assignment-backend:${{ github.sha }}"
          echo "Running: update ECS task definition / deploy container to EC2"
          echo "Backend deployment successfully simulated."
