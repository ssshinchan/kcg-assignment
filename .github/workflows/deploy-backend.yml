name: Backend CI/CD Pipeline

on:
  push:
    branches:
      - master
    paths-ignore:
      - 'frontend/**'

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Configure AWS Credentials
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # 2. Login to Amazon ECR Public
      - name: Login to Amazon ECR Public
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      # 3. Set public ECR registry and repository environment variables
      - name: Set ECR variables
        run: |
          echo "ECR_REGISTRY=public.ecr.aws/v2h0k5d2" >> $GITHUB_ENV
          echo "ECR_REPOSITORY=kcg/assignment-backend" >> $GITHUB_ENV

      # 4. Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 5. Build & Push Backend Docker Image to ECR
      - name: Build and Push Backend Docker Image to ECR
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      # 6. Deploy latest backend container over SSH
      - name: Deploy latest backend container over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            ECR_REGISTRY="${{ env.ECR_REGISTRY }}"
            ECR_REPOSITORY="${{ env.ECR_REPOSITORY }}"
            AWS_REGION="${{ secrets.AWS_REGION }}"
            IMAGE="$ECR_REGISTRY/$ECR_REPOSITORY:latest"
            CONTAINER_NAME="assignment-backend"
            LOG_GROUP="/assignment/assignment-backend"
            LOG_STREAM="backend-${{ github.sha }}"
            echo "===== Deploying backend container ====="
            docker pull "$IMAGE"
            docker rm -f "$CONTAINER_NAME" || true
            docker run -d \
              --name "$CONTAINER_NAME" \
              --restart unless-stopped \
              --env-file .env \
              --add-host=host.docker.internal:host-gateway \
              --log-driver=awslogs \
              --log-opt awslogs-region="$AWS_REGION" \
              --log-opt awslogs-group="$LOG_GROUP" \
              --log-opt awslogs-stream="$LOG_STREAM" \
              --log-opt mode=non-blocking \
              --log-opt max-buffer-size=4m \
              -p 8080:8080 \
              "$IMAGE"
            echo "Backend container deployed successfully."
